<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌺 夏威夷自由行 2026 | Chang Family</title>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{--ocean:#1a5276;--palm:#1e8449;--sun:#e67e22;--coral:#e74c3c;--text:#2c3e50;--shadow:0 2px 12px rgba(0,0,0,.10);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,'Microsoft JhengHei','PingFang TC',sans-serif;background:#f5f6fa;color:var(--text);}

/* HERO */
.hero{background:linear-gradient(150deg,#0d2137 0%,#1a5276 50%,#117a65 100%);color:#fff;padding:56px 20px 36px;text-align:center;}
.hero h1{font-size:clamp(1.8rem,5vw,3rem);font-weight:800;letter-spacing:-.5px;margin-bottom:6px;}
.hero .sub{font-size:1.05rem;opacity:.85;margin-bottom:24px;}
.hero-meta{display:flex;justify-content:center;gap:28px;flex-wrap:wrap;}
.hm{display:flex;flex-direction:column;align-items:center;}
.hm .lbl{font-size:.7rem;opacity:.65;text-transform:uppercase;letter-spacing:1px;}
.hm .val{font-size:.95rem;font-weight:700;margin-top:2px;}
.flight-badge{margin-top:20px;display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.15);padding:8px 18px;border-radius:30px;font-size:.85rem;}

/* NAV */
.nav{background:#fff;box-shadow:var(--shadow);position:sticky;top:0;z-index:200;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.nav-inner{display:flex;min-width:max-content;padding:0 12px;}
.nt{padding:13px 14px;cursor:pointer;font-size:.8rem;font-weight:600;color:#777;border-bottom:3px solid transparent;white-space:nowrap;transition:all .18s;}
.nt:hover{color:var(--ocean);}
.nt.active{color:var(--ocean);border-bottom-color:var(--ocean);}

/* SECTIONS */
.sec{display:none;padding:20px;max-width:1180px;margin:0 auto;}
.sec.active{display:block;}
.sec-title{font-size:1.25rem;font-weight:700;margin-bottom:16px;padding-bottom:10px;border-bottom:3px solid var(--ocean);display:flex;align-items:center;gap:8px;}

/* DAY HEADER */
.day-hdr{background:var(--ocean);color:#fff;border-radius:12px;padding:18px 22px;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.day-hdr h2{font-size:1.3rem;font-weight:800;}
.day-hdr .badges{display:flex;gap:8px;flex-wrap:wrap;}
.dbg{background:rgba(255,255,255,.2);padding:4px 12px;border-radius:20px;font-size:.78rem;font-weight:600;}

/* DAY LAYOUT */
.day-body{display:grid;grid-template-columns:1fr 400px;gap:18px;align-items:start;}
@media(max-width:860px){.day-body{grid-template-columns:1fr;}}

/* TIMELINE */
.tl{position:relative;}
.tl::before{content:'';position:absolute;left:22px;top:0;bottom:0;width:2px;background:#e0e0e0;}
.tl-item{position:relative;padding-left:56px;margin-bottom:14px;}
.tl-dot{position:absolute;left:14px;top:14px;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;z-index:1;background:var(--ocean);}
.tl-dot.food{background:var(--sun);}
.tl-dot.transport{background:#95a5a6;}
.tl-dot.hotel{background:var(--coral);}
.tl-card{background:#fff;border-radius:10px;padding:12px 15px;box-shadow:var(--shadow);border-left:3px solid var(--ocean);}
.tl-card.food{border-left-color:var(--sun);}
.tl-card.transport{border-left-color:#bdc3c7;}
.tl-card.hotel{border-left-color:var(--coral);}
.tc-time{font-size:.72rem;color:#999;font-weight:700;margin-bottom:3px;letter-spacing:.3px;}
.tc-name{font-size:.98rem;font-weight:700;margin-bottom:4px;}
.tc-name a{color:inherit;text-decoration:none;}
.tc-name a:hover{color:var(--ocean);text-decoration:underline;}
.tc-desc{font-size:.82rem;color:#666;line-height:1.55;}
.tc-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.tag{font-size:.7rem;padding:2px 9px;border-radius:10px;font-weight:600;}
.tag.stay{background:#eaf4ff;color:var(--ocean);}
.tag.drive{background:#fef9e7;color:#d68910;}
.tag.rating{background:#fef5e4;color:#c0392b;letter-spacing:.3px;}
.tag.reviews{background:#f0f0f0;color:#777;}
.tag.tip{background:#ffeaa7;color:#6c5ce7;}
.tag.price{background:#e8f8f5;color:#117a65;}
.tag.book{background:#fce4ec;color:#c0392b;}

/* TRAVEL CONNECTOR */
.drive-conn{display:flex;align-items:center;padding:2px 0 2px 56px;margin-bottom:8px;}
.dc-line{flex:1;height:1px;background:repeating-linear-gradient(90deg,#ccc 0,#ccc 5px,transparent 5px,transparent 10px);}
.dc-label{font-size:.72rem;color:#aaa;padding:0 8px;white-space:nowrap;}

/* MAP */
.map-wrap{position:sticky;top:72px;}
.map-box{background:#fff;border-radius:12px;overflow:hidden;box-shadow:var(--shadow);}
.map-hdr{padding:12px 16px;background:var(--ocean);color:#fff;font-weight:600;font-size:.88rem;display:flex;justify-content:space-between;align-items:center;}
.map-hdr a{color:rgba(255,255,255,.9);font-size:.75rem;background:rgba(255,255,255,.2);padding:3px 10px;border-radius:6px;text-decoration:none;}
.map-hdr a:hover{background:rgba(255,255,255,.35);}
.map-el{height:420px;}
.map-legend{padding:10px 14px;font-size:.75rem;color:#777;display:flex;gap:14px;flex-wrap:wrap;}
.ml-item{display:flex;align-items:center;gap:4px;}
.ml-dot{width:10px;height:10px;border-radius:50%;}

/* NOTICE */
.notice{border-radius:8px;padding:11px 15px;margin-bottom:14px;font-size:.83rem;display:flex;gap:10px;align-items:flex-start;line-height:1.5;}
.notice.warn{background:#fff8e1;border-left:4px solid #ffc107;}
.notice.info{background:#e3f2fd;border-left:4px solid #2196f3;}
.notice.green{background:#e8f5e9;border-left:4px solid #4caf50;}

/* OVERVIEW */
.ov-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-bottom:22px;}
.ov-card{background:#fff;border-radius:10px;padding:18px;box-shadow:var(--shadow);text-align:center;}
.ov-card .icon{font-size:2rem;margin-bottom:6px;}
.ov-card .lbl{font-size:.72rem;color:#999;text-transform:uppercase;letter-spacing:.5px;font-weight:600;}
.ov-card .val{font-size:1.15rem;font-weight:800;color:var(--text);margin-top:2px;}

/* DAYS LIST */
.days-list{background:#fff;border-radius:10px;box-shadow:var(--shadow);overflow:hidden;}
.day-row{display:flex;align-items:center;padding:14px 18px;border-bottom:1px solid #f2f2f2;cursor:pointer;transition:background .15s;}
.day-row:last-child{border-bottom:none;}
.day-row:hover{background:#f8f9fa;}
.dr-num{width:46px;height:46px;border-radius:10px;background:var(--ocean);color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;line-height:1.2;}
.dr-num .dn{font-size:1rem;font-weight:800;}
.dr-num .dm{font-size:.6rem;opacity:.75;}
.dr-info{margin-left:14px;flex:1;}
.dr-info h3{font-size:.95rem;font-weight:700;margin-bottom:2px;}
.dr-info p{font-size:.78rem;color:#999;}
.dr-arrow{color:#ddd;font-size:1.1rem;}

/* FOOD PAGE */
.food-filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.ff-btn{padding:6px 14px;border-radius:20px;border:1px solid #ddd;background:#fff;font-size:.8rem;cursor:pointer;font-weight:600;transition:all .15s;}
.ff-btn.active,.ff-btn:hover{background:var(--ocean);color:#fff;border-color:var(--ocean);}
.food-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
.fc{background:#fff;border-radius:10px;padding:16px;box-shadow:var(--shadow);border-top:3px solid var(--sun);}
.fc h3{font-size:.95rem;font-weight:700;margin-bottom:3px;}
.fc h3 a{color:inherit;text-decoration:none;}
.fc h3 a:hover{color:var(--ocean);text-decoration:underline;}
.fc .cat{font-size:.72rem;color:#aaa;margin-bottom:6px;}
.fc .stars{color:#f39c12;letter-spacing:1px;font-size:.85rem;}
.fc .rc{font-size:.72rem;color:#aaa;margin-left:4px;}
.fc .fdesc{font-size:.82rem;color:#666;line-height:1.5;margin-top:6px;}
.fc .fhours{font-size:.75rem;color:#27ae60;margin-top:8px;font-weight:600;}
.fc .farea{font-size:.72rem;color:#888;margin-top:3px;}

/* TIPS */
.tips-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;}
.tip-card{background:#fff;border-radius:10px;padding:18px;box-shadow:var(--shadow);}
.tip-card h3{font-size:.95rem;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.tip-card li{font-size:.82rem;color:#555;padding:5px 0;border-bottom:1px solid #f5f5f5;padding-left:14px;position:relative;line-height:1.5;}
.tip-card li::before{content:'•';position:absolute;left:0;color:var(--ocean);}
.tip-card li:last-child{border-bottom:none;}

/* overall map */
#overview-map{height:400px;border-radius:10px;overflow:hidden;box-shadow:var(--shadow);margin-bottom:20px;}

@media(max-width:580px){
  .sec{padding:12px;}
  .tl-item{padding-left:46px;}
  .tl::before{left:18px;}
  .tl-dot{left:10px;}
  .drive-conn{padding-left:46px;}
}
</style>
</head>

// ─── RENDER ───────────────────────────────────────────────────────
const maps = {};

function stars(s){ return s; }

function renderStop(s, idx){
  if(s.drive) return `<div class="drive-conn"><div class="dc-line"></div><div class="dc-label">🚗 ${s.drive}</div><div class="dc-line"></div></div>`;
  const dotClass = s.type==='food'?'food':s.type==='transport'?'transport':s.type==='hotel'?'hotel':'';
  const cardClass = s.type==='food'?'food':s.type==='transport'?'transport':s.type==='hotel'?'hotel':'';
  const num = typeof s.n === 'number' ? s.n : '🍽';
  const tags = (s.tags||[]).map(t=>`<span class="tag ${t.c}">${t.t}</span>`).join('');
  const mapsLink = s.maps ? `<a href="${s.maps}" target="_blank" rel="noopener">${s.name}</a>` : s.name;
  return `<div class="tl-item">
    <div class="tl-dot ${dotClass}">${num}</div>
    <div class="tl-card ${cardClass}">
      <div class="tc-time">${s.time||''}</div>
      <div class="tc-name">${mapsLink}</div>
      <div class="tc-desc">${s.desc||''}</div>
      ${tags?`<div class="tc-tags">${tags}</div>`:''}
    </div>
  </div>`;
}

function buildRoute(day){
  const coords = [HOTEL, ...day.stops.filter(s=>s.lat).map(s=>({lat:s.lat,lng:s.lng})), HOTEL];
  return coords.map(c=>`${c.lat},${c.lng}`).join('/');
}

function renderDay(day){

  return `
<div class="day-hdr" style="background:${day.color||'var(--ocean)'}">
  <div>
    <div style="font-size:.8rem;opacity:.8;margin-bottom:2px">Day ${day.day} &nbsp;·&nbsp; ${day.theme||''}</div>
    <h2>📅 ${day.date}（週${day.weekday}）&nbsp; ${day.title}</h2>
  </div>
  <div class="badges">
    <span class="dbg">08:00 出發</span>

  </div>
</div>
${notice}
<div class="day-body">

        <div class="ml-item"><div class="ml-dot" style="background:#1a5276"></div> 景點</div>

function initDayMap(day){
  const el = document.getElementById(`map-day${day.day}`);
  if(!el || maps[day.day]) return;
  const m = L.map(el).setView(day.mapCenter, day.mapZoom||12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap',maxZoom:19
  }).addTo(m);
  maps[day.day] = m;

  // Hotel marker
  const hotelIcon = L.divIcon({className:'',html:`<div style="background:#e74c3c;color:#fff;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.3)">0</div>`,iconSize:[28,28],iconAnchor:[14,14]});
  L.marker([HOTEL.lat, HOTEL.lng],{icon:hotelIcon}).addTo(m).bindPopup(`<b>🏨 飯店</b><br>${HOTEL.name}`);

  const pts = [[HOTEL.lat,HOTEL.lng]];
  day.stops.filter(s=>s.lat).forEach((s,i)=>{
    const color = s.type==='food'?'#e67e22':s.type==='hotel'?'#e74c3c':'#1a5276';
    const num = typeof s.n==='number'?s.n:i+1;
    const icon = L.divIcon({className:'',html:`<div style="background:${color};color:#fff;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.3)">${num}</div>`,iconSize:[26,26],iconAnchor:[13,13]});
    const marker = L.marker([s.lat,s.lng],{icon}).addTo(m);
    const mLink = s.maps?`<a href="${s.maps}" target="_blank">Google Maps</a>`:'';
    marker.bindPopup(`<b>${num}. ${s.name}</b><br><small>${s.time||''}</small><br>${mLink}`);
    pts.push([s.lat,s.lng]);
  });
  pts.push([HOTEL.lat,HOTEL.lng]);
  L.polyline(pts,{color:'#1a5276',weight:2.5,opacity:0.65,dashArray:'6,6'}).addTo(m);
}

function initOverviewMap(){
  const m = L.map('overview-map').setView([21.4, -157.95], 10);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19}).addTo(m);
  const icon = L.divIcon({className:'',html:`<div style="background:#e74c3c;color:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.4)">🏨</div>`,iconSize:[32,32],iconAnchor:[16,16]});

    {name:"North Shore",lat:21.6427,lng:-158.0636,day:6},
    {name:"Ko Olina",lat:21.3444,lng:-158.1252,day:7},

    {name:"PCC",lat:21.6441,lng:-157.9292,day:10},
  ];
  areas.forEach(a=>{

  });

function switchTab(id){
  document.querySelectorAll('.nt').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.sec').forEach(el=>el.classList.remove('active'));
  document.querySelector(`[data-id="${id}"]`)?.classList.add('active');
  document.getElementById(`sec-${id}`)?.classList.add('active');
  // Scroll nav tab into view
  const nt = document.querySelector(`[data-id="${id}"]`);
  if(nt) nt.scrollIntoView({block:'nearest',inline:'center',behavior:'smooth'});
  // Init map
  const dayMatch = id.match(/^day(\d+)$/);
  if(dayMatch){
    const dayNum = parseInt(dayMatch[1]);
    const day = DAYS.find(d=>d.day===dayNum);
    if(day) setTimeout(()=>initDayMap(day),50);
  }
  if(id==='overview') setTimeout(initOverviewMap,50);
}
